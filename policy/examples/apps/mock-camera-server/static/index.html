<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Camera Server</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background:
        radial-gradient(circle at 85% 10%, rgba(136,58,255,0.16), rgba(75,0,153,0.08) 40%, transparent 70%),
        radial-gradient(circle at 15% 90%, rgba(142,86,252,0.08), rgba(75,0,153,0.04) 40%, transparent 65%),
        #0E101C;
      color: #e4e4e7;
      min-height: 100vh;
    }

    .controls {
      padding: 24px 40px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .btn {
      padding: 9px 18px;
      border-radius: 8px;
      border: 1px solid rgba(136,58,255,0.4);
      background: rgba(136,58,255,0.12);
      color: #956FFA;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .btn:hover {
      background: rgba(136,58,255,0.22);
      border-color: rgba(136,58,255,0.6);
      color: #FFF;
    }
    .btn:active { transform: scale(0.97); }
    .btn-hidden { display: none; }
    .fps-info {
      font-size: 13px;
      color: #5B5782;
      font-family: 'JetBrains Mono', monospace;
      margin-left: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 16px;
      padding: 0 40px 40px;
    }

    .card {
      border-radius: 12px;
      background: #232039;
      border: 1px solid #454167;
      box-shadow: inset 0 1px 0 0 rgba(149,111,250,0.06), 0 12px 24px -12px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    .card-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(69,65,103,0.5);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      transition: all 0.3s;
    }
    .dot-on {
      background: #66BB6A;
      box-shadow: 0 0 8px rgba(102,187,106,0.5);
    }
    .dot-off {
      background: #454167;
    }
    .card-header .name {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #FFF;
    }
    .card-header .meta {
      margin-left: auto;
      font-size: 12px;
      color: #5B5782;
      font-family: 'JetBrains Mono', monospace;
    }
    .card video {
      width: 100%;
      display: block;
      background: #13132A;
      aspect-ratio: 4/3;
      object-fit: cover;
    }


  </style>
</head>
<body>
  <div class="controls">
    <button class="btn" id="connect-btn" onclick="connectAll()">Connect All Cameras</button>
    <span class="fps-info" id="fps-info"></span>
  </div>

  <div class="grid" id="camera-grid"></div>



  <script>
    const CAMERAS = [
      { id: "315122271048", name: "flange" },
      { id: "314522065367", name: "left" },
      { id: "319522063360", name: "right" },
    ];

    let connections = {};
    let frameCounters = {};
    let fpsInterval = null;

    function createCards() {
      const grid = document.getElementById("camera-grid");
      grid.innerHTML = "";
      for (const cam of CAMERAS) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="card-header">
            <div class="dot dot-off" id="dot-${cam.id}"></div>
            <span class="name">${cam.name}</span>
            <span class="meta" id="meta-${cam.id}">(${cam.id})</span>
          </div>
          <video id="video-${cam.id}" autoplay muted playsinline></video>
        `;
        grid.appendChild(card);
      }
    }

    async function connectCamera(cam) {
      await fetch(`/api/devices/${cam.id}/stream/start`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: "{}",
      });

      const offerResp = await fetch("/api/webrtc/offer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ device_id: cam.id, stream_types: ["color"] }),
      });
      const offerData = await offerResp.json();

      const pc = new RTCPeerConnection();
      connections[cam.id] = pc;
      frameCounters[cam.id] = { frames: 0, lastTime: performance.now() };

      pc.ontrack = (evt) => {
        const video = document.getElementById(`video-${cam.id}`);
        video.srcObject = evt.streams[0];
        document.getElementById(`dot-${cam.id}`).className = "dot dot-on";
        document.getElementById(`meta-${cam.id}`).textContent = "streaming";

        if (video.requestVideoFrameCallback) {
          video.requestVideoFrameCallback(function countFrame() {
            frameCounters[cam.id].frames++;
            video.requestVideoFrameCallback(countFrame);
          });
        }
      };

      pc.oniceconnectionstatechange = () => {
        if (pc.iceConnectionState === "disconnected" || pc.iceConnectionState === "failed") {
          document.getElementById(`dot-${cam.id}`).className = "dot dot-off";
          document.getElementById(`meta-${cam.id}`).textContent = pc.iceConnectionState;
        }
      };

      await pc.setRemoteDescription(new RTCSessionDescription({
        sdp: offerData.sdp,
        type: offerData.type,
      }));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      await fetch("/api/webrtc/answer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: offerData.session_id,
          sdp: answer.sdp,
          type: answer.type,
        }),
      });
    }

    async function connectAll() {
      const btn = document.getElementById("connect-btn");
      btn.textContent = "Connecting…";
      btn.disabled = true;
      btn.style.opacity = "0.6";

      try {
        await Promise.all(CAMERAS.map(connectCamera));
        btn.textContent = "Disconnect";
        btn.disabled = false;
        btn.style.opacity = "";
        btn.onclick = disconnectAll;
        startFpsUpdate();
      } catch (e) {
        btn.textContent = "Connect All Cameras";
        btn.disabled = false;
        btn.style.opacity = "";
        console.error(e);
      }
    }

    function disconnectAll() {
      for (const [id, pc] of Object.entries(connections)) {
        pc.close();
        document.getElementById(`dot-${id}`).className = "dot dot-off";
        document.getElementById(`meta-${id}`).textContent = "offline";
        const video = document.getElementById(`video-${id}`);
        if (video.srcObject) {
          video.srcObject.getTracks().forEach(t => t.stop());
          video.srcObject = null;
        }
      }
      connections = {};
      if (fpsInterval) { clearInterval(fpsInterval); fpsInterval = null; }
      const btn = document.getElementById("connect-btn");
      btn.textContent = "Connect All Cameras";
      btn.onclick = connectAll;
      document.getElementById("fps-info").textContent = "";
    }

    function startFpsUpdate() {
      fpsInterval = setInterval(() => {
        const parts = [];
        for (const cam of CAMERAS) {
          const c = frameCounters[cam.id];
          if (!c) continue;
          const now = performance.now();
          const elapsed = (now - c.lastTime) / 1000;
          const fps = elapsed > 0 ? (c.frames / elapsed).toFixed(1) : "—";
          parts.push(`${cam.name} ${fps}`);
          c.frames = 0;
          c.lastTime = now;
        }
        document.getElementById("fps-info").textContent = parts.join(" · ") + " fps";
      }, 2000);
    }

    createCards();
  </script>

  <pre id="code-snippet" style="margin: 24px 40px; padding: 16px 20px; border-radius: 10px; background: #232039; border: 1px solid #454167; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #956FFA; overflow-x: auto; white-space: pre; line-height: 1.6;"></pre>

  <script>
    fetch("/status").then(r => r.json()).then(d => {
      const port = window.location.port || "9100";
      const ip = d.host_ip || "localhost";
      document.getElementById("code-snippet").textContent = `cameras = CameraSet(
    api_url="http://${ip}:${port}",
    devices={"flange": "315122271048", "left": "314522065367", "right": "319522063360"},
    width=640,
    height=480,
    fps=15,
)`;
    });
  </script>
</body>
</html>
