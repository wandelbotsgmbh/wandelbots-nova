---
name: "@wandelbots/wandelbots-nova: Typecheck, Lint and Format"

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip
      CELL_NAME: cell
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Python environment
        run: |
          pip install uv
          uv sync --extra "nova-rerun-bridge" --extra "novapolicy-gr00t" --extra "wandelscript" --extra "novax"

      - name: Check formatting with ruff
        run: uv run ruff format --check .

      - name: Check import order
        run: uv run ruff check --select I

      - name: Check ruff for linting
        run: uv run ruff check .

      - name: Typecheck
        run: uv run ty check

      - name: Run tests
        run: PYTHONPATH=. LOG_LEVEL=WARNING uv run pytest -rs -v -m "not integration"

  test-novapolicy-lerobot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Python environment
        run: |
          pip install uv
          uv sync --extra "novapolicy-lerobot"

      - name: Verify the installed LeRobot integration
        run: |
          uv run python -c "import novapolicy.lerobot.client, novapolicy.lerobot.schema, novapolicy.lerobot.transport"

      - name: Run LeRobot tests
        run: |
          uv run pytest -rs -v \
            novapolicy/tests/api/test_lerobot_client.py \
            novapolicy/tests/unit/test_lerobot_config.py \
            novapolicy/tests/unit/test_lerobot_schema.py
